<div class="flex">
  <div class="wrap">
    <e-popover-button target="x-1">toggle-x-1</e-popover-button>
    <e-popover
      class="x"
      id="x-1"
      >x-1</e-popover
    >
  </div>

  <div class="wrap">
    <e-popover-button target="x-2">toggle-x-2</e-popover-button>
    <e-popover
      class="x"
      id="x-2"
      >x-2</e-popover
    >
  </div>

  <div class="wrap">
    <e-popover-button target="x-3">toggle-x-3</e-popover-button>
    <e-popover
      class="x"
      id="x-3"
      >x-3</e-popover
    >
  </div>

  <div class="wrap">
    <e-popover-button target="y-3">toggle-y-3</e-popover-button>
    <e-popover id="y-3">y-3</e-popover>
  </div>

  <div class="wrap">
    <e-popover-button target="portal-1">portal popover</e-popover-button>
    <e-popover
      class="x portal"
      id="portal-1"
      >moved to #popover-portal while open</e-popover
    >
  </div>

  <div class="wrap">
    <e-popover-button target="body-1">body popover</e-popover-button>
    <e-popover
      class="x body-anchor"
      id="body-1"
      >moved to body while open</e-popover
    >
  </div>
</div>

<div id="popover-portal"></div>
